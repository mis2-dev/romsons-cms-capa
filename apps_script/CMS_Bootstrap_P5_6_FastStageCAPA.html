<!-- P5.2 Full stable bootstrap: core app + More Info UX final + alerts. -->
<style>
.p53-hero{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:linear-gradient(135deg,#effcf8,#f8fffd);border:1px solid #cce7e1;border-radius:16px;padding:13px 14px;margin-bottom:12px}.p53-hero h6{font-size:17px;margin:2px 0 4px;color:#075e57;font-weight:900}.p53-stage-chip{background:#0f766e;color:#fff;border-radius:999px;padding:8px 11px;font-weight:900;font-size:12px;white-space:nowrap}.p53-checklist{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:10px 0 14px}.p53-check{background:#fff;border:1px solid #dceceb;border-radius:12px;padding:8px 9px;font-size:12px;font-weight:800;color:#64748b}.p53-check span{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;margin-right:6px;background:#e2e8f0;color:#64748b}.p53-check.done{color:#166534;background:#f0fdf4;border-color:#bbf7d0}.p53-check.done span{background:#16a34a;color:#fff}.p53-read-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.p53-read-grid div{background:#f8fafc;border:1px solid #e2e8f0;border-radius:11px;padding:8px}.p53-read-grid p{margin:3px 0 0}.capa-history{border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;background:#fff}.capa-history-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid #e2e8f0}.capa-history-row:last-child{border-bottom:0}.p53-upload-box{border:1px dashed #9dd8cf;background:#f8fffd;border-radius:14px;padding:12px}@media(max-width:768px){.p53-checklist{grid-template-columns:1fr}.p53-read-grid{grid-template-columns:1fr}.p53-hero{flex-direction:column}.capa-history-row{grid-template-columns:1fr}}
</style>

<script>
(function(){
  'use strict';
  var loginBusy = false;
  window.CMS_ROWS = window.CMS_ROWS || [];
  window.CURRENT_FY_KEY = window.CURRENT_FY_KEY || 'ALL';

  function byId(id){ return document.getElementById(id); }
  function esc(v){ return String(v == null ? '' : v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c];}); }
  function getVal(id){ var el = byId(id); return el && typeof el.value === 'string' ? el.value.trim() : ''; }
  function setText(id, value){ var el = byId(id); if (el) el.innerText = value; }

  window.showLoader = function(v){ var el = byId('loader'); if (el) el.style.display = v ? 'flex' : 'none'; };

  function popup(title, message, onOk){
    var old = byId('cmsBootPopup'); if (old) old.remove();
    var wrap = document.createElement('div');
    wrap.id = 'cmsBootPopup';
    wrap.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(15,23,42,.35);display:flex;align-items:center;justify-content:center;padding:18px;';
    wrap.innerHTML = '<div style="width:min(440px,96vw);background:#fff;border-radius:18px;box-shadow:0 22px 55px rgba(0,0,0,.22);border:1px solid #d9e8e5;overflow:hidden">'
      + '<div style="padding:16px 18px;background:linear-gradient(135deg,#0f766e,#0d9488);color:#fff;font-weight:900;font-size:17px">'+esc(title||'CMS')+'</div>'
      + '<div style="padding:18px;color:#17343a;white-space:pre-wrap;font-size:14px;line-height:1.5">'+esc(message||'')+'</div>'
      + '<div style="padding:12px 18px;text-align:right;background:#f8fafc"><button id="cmsBootOk" type="button" style="border:0;border-radius:10px;padding:9px 18px;background:#0f766e;color:#fff;font-weight:800;cursor:pointer">OK</button></div>'
      + '</div>';
    document.body.appendChild(wrap);
    byId('cmsBootOk').onclick = function(){ wrap.remove(); if (typeof onOk === 'function') onOk(); };
  }
  window.showError = function(msg){ popup('❌ CMS Error', msg || 'Something went wrong'); };
  window.showInfo = function(title,msg){ popup(title || 'CMS', msg || ''); };
  window.showModal = function(title, body){ popup(title || 'CMS', body || ''); };
  window.showSuccess = function(title, msg, complaintNo){ popup(title || '✅ Success', (msg || '') + (complaintNo ? ('\n\nComplaint No: '+complaintNo) : '')); };

  window.showPage = function(pageId){
    document.querySelectorAll('.app-page').forEach(function(p){ p.classList.remove('active'); });
    var page = byId(pageId); if (page) page.classList.add('active');
    var app = byId('app'); if (app && pageId === 'formPage') app.style.display = 'block';
    if (pageId === 'listPage') window.loadCmsTrackingV2();
    window.scrollTo({top:0,behavior:'smooth'});
  };
  window.hideAllPages = function(){ document.querySelectorAll('.app-page').forEach(function(p){ p.classList.remove('active'); }); };

  function renderCards(cards){ cards = cards || {}; setText('cmsTotal', cards.total || 0); setText('cmsOpen', cards.open || 0); setText('cmsClosed', cards.closed || 0); setText('cmsOverdue', cards.overdue || 0); }
  function statusClass(s){ s = String(s||'').toLowerCase(); if (s.indexOf('closed') >= 0) return 'closed-status'; if (s.indexOf('reject') >= 0 || s.indexOf('reopen') >= 0) return 'rejected-status'; if (s.indexOf('booked') >= 0 || s.indexOf('pending') >= 0) return 'pending-status'; return 'active-status'; }
  function renderRows(rows){
    var tb = byId('complaintTable'); if (!tb) return;
    rows = rows || [];
    if (!rows.length){ tb.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-3">No complaints found for selected FY</td></tr>'; return; }
    tb.innerHTML = rows.map(function(c){
      var cn = String(c.complaintNo || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return '<tr>'
        + '<td><b>'+esc(c.complaintNo)+'</b><br><small>'+esc(c.date||'')+'</small></td>'
        + '<td>'+esc(c.customer||'—')+'<br><small>'+esc(c.city||'')+'</small></td>'
        + '<td>'+esc(c.product||'—')+'<br><small>Batch: '+esc(c.batch||'—')+'</small></td>'
        + '<td>'+esc(c.severity||'—')+'</td>'
        + '<td><span class="status-badge '+statusClass(c.status)+'">'+esc(c.status||'Complaint Booked')+'</span></td>'
        + '<td>'+esc(c.ageDays||0)+' days</td>'
        + '<td><button class="btn-soft" onclick="openCmsDetail(\''+cn+'\')">Track / View</button></td>'
        + '</tr>';
    }).join('');
  }
  function miniBars(id, items){
    var box = byId(id); if (!box) return;
    items = items || [];
    if (!items.length){ box.innerHTML = '<div class="text-muted small">No data</div>'; return; }
    box.innerHTML = items.map(function(x){ return '<div class="d-flex justify-content-between align-items-center py-1 border-bottom"><span>'+esc(x.label)+'</span><b>'+esc(x.count || 0)+'</b></div>'; }).join('');
  }
  function normalizeAnalytics(res){
    var a = (res && res.analytics) || {};
    var stageItems = a.byStage || [];
    var sevItems = a.bySeverity || [];
    if ((!stageItems.length) && res && res.stageCounts) stageItems = Object.keys(res.stageCounts).map(function(k){return {label:k,count:res.stageCounts[k]};});
    if ((!sevItems.length) && res && res.severityCounts) sevItems = Object.keys(res.severityCounts).map(function(k){return {label:k,count:res.severityCounts[k]};});
    miniBars('stageAnalytics', stageItems);
    miniBars('severityAnalytics', sevItems);
  }
  function populateFy(res){
    var opts = [{key:'ALL', label:'All FY'}].concat((res && res.fyOptions) || []);
    var current = (res && res.selectedFY) || window.CURRENT_FY_KEY || 'ALL';
    if (current !== 'ALL' && !opts.some(function(o){return o.key === current;})) opts.push({key:current,label:'FY '+current});
    ['fyFilter','listFyFilter'].forEach(function(id){
      var el = byId(id); if (!el) return;
      var prev = el.value || current || 'ALL';
      el.innerHTML = opts.map(function(o){ return '<option value="'+esc(o.key)+'">'+esc(o.label || o.key)+'</option>'; }).join('');
      el.value = opts.some(function(o){return o.key === prev;}) ? prev : (current || 'ALL');
    });
  }

  window.loadCmsTrackingV2 = function(done){
    window.showLoader(true);
    var fy = (byId('fyFilter') && byId('fyFilter').value) || (byId('listFyFilter') && byId('listFyFilter').value) || window.CURRENT_FY_KEY || 'ALL';
    google.script.run
      .withSuccessHandler(function(res){
        window.showLoader(false);
        if (!res || res.status !== 'success') { window.showError((res && res.message) || 'Tracking data load failed'); return; }
        window.CURRENT_FY_KEY = res.selectedFY || fy || 'ALL';
        window.CMS_ROWS = res.rows || [];
        populateFy(res); renderCards(res.cards || {}); renderRows(window.CMS_ROWS); normalizeAnalytics(res);
        if (typeof done === 'function') done();
      })
      .withFailureHandler(function(err){ window.showLoader(false); window.showError((err && err.message) || 'Complaint list load failed'); })
      .getCmsTrackingData(fy);
  };
  window.changeFinancialYear = function(value){
    var val = value || (byId('fyFilter') && byId('fyFilter').value) || (byId('listFyFilter') && byId('listFyFilter').value) || 'ALL';
    window.CURRENT_FY_KEY = val;
    if (byId('fyFilter')) byId('fyFilter').value = val;
    if (byId('listFyFilter')) byId('listFyFilter').value = val;
    window.loadCmsTrackingV2();
  };
  window.filterCmsRows = function(){
    var q = (getVal('searchBox') || '').toLowerCase(); var st = getVal('statusFilter');
    renderRows((window.CMS_ROWS || []).filter(function(c){ var okQ = !q || JSON.stringify(c).toLowerCase().indexOf(q) >= 0; var okS = !st || c.status === st; return okQ && okS; }));
  };

  function publicTrackingUrl(complaintNo){ return window.location.href.split('?')[0] + '?track=' + encodeURIComponent(complaintNo || ''); }

  function safeLink(label, url){ return url ? '<a class="btn-soft me-2" target="_blank" href="'+esc(url)+'">'+esc(label)+'</a>' : ''; }

  function stageAccent(status){
    var s = String(status || '').toLowerCase();
    if (s.indexOf('closed') >= 0) return 'closed';
    if (s.indexOf('capa') >= 0) return 'capa';
    if (s.indexOf('investigation') >= 0) return 'investigation';
    if (s.indexOf('info') >= 0) return 'info';
    if (s.indexOf('review') >= 0) return 'review';
    return 'booked';
  }

  window.openCmsDetail = function(complaintNo){
    var rows = window.CMS_ROWS || [];
    var c = rows.find(function(x){ return String(x.complaintNo) === String(complaintNo); });
    if (!c) { popup('Complaint Detail', 'Complaint not found in loaded list. Refresh list once and try again.'); return; }
    window.CURRENT_COMPLAINT = c;
    if (byId('detailTitle')) byId('detailTitle').innerText = c.complaintNo || '';
    var detail = byId('detailBody');
    if (detail) {
      var accent = stageAccent(c.status);
      detail.innerHTML = '<div class="cms-detail-hero '+accent+'">'
        + '<div class="cms-detail-main">'
        + '<div class="detail-kicker">Complaint / CAPA Case</div>'
        + '<h4>'+esc(c.complaintNo || '—')+'</h4>'
        + '<div class="detail-hero-grid">'
        + '<div><span>Customer</span><b>'+esc(c.customer || '—')+'</b></div>'
        + '<div><span>Product</span><b>'+esc(c.product || '—')+'</b></div>'
        + '<div><span>Batch</span><b>'+esc(c.batch || '—')+'</b></div>'
        + '<div><span>Severity</span><b>'+esc(c.severity || '—')+'</b></div>'
        + '</div>'
        + '</div>'
        + '<div class="cms-detail-status">'
        + '<div class="stage-pill big">'+esc(c.status || 'Complaint Booked')+'</div>'
        + '<div class="small mt-2">Owner: <b>'+esc(c.stageOwner || '—')+'</b></div>'
        + '<div class="small">CAPA: <b>'+esc(c.capaSubStatus || 'Not started')+'</b>'+ (c.capaVersion ? ' · V'+esc(c.capaVersion) : '') +'</div>'
        + '</div>'
        + '</div>'
        + '<div class="quick-link-row">'
        + safeLink('Open PDF', c.pdfUrl)
        + safeLink('Open Folder', c.folderUrl)
        + '<a class="btn-soft me-2" target="_blank" href="'+esc(publicTrackingUrl(c.complaintNo))+'">Public Tracking</a>'
        + '<button class="btn-soft" type="button" onclick="copyPublicTrackingLink()">Copy Tracking Link</button>'
        + '</div>';
    }
    ['historyBox','stageProgress','trackingLogList','lifecycleActions','infoRequestContent','p4WorkspaceContent','requestMiniTimeline','workspaceChatPanel'].forEach(function(id){ var el=byId(id); if(el) el.innerHTML='<div class="text-muted small py-2">Loading...</div>'; });
    if (byId('trackingSubTitle')) byId('trackingSubTitle').innerText = 'Complaint No: ' + (c.complaintNo || '—');
    if (byId('lifecycleRemark')) byId('lifecycleRemark').value = '';
    openDetailModal();
    loadDetailSections(c.complaintNo);
  };

  window.copyPublicTrackingLink = function(){
    var c = window.CURRENT_COMPLAINT; if(!c) return;
    var link = publicTrackingUrl(c.complaintNo);
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(link).then(function(){ popup('Copied', 'Public tracking link copied.'); }); }
    else popup('Public Tracking Link', link);
  };

  function openDetailModal(){
    // P5.4: detail view is now a full-screen workspace page instead of a crowded modal.
    if (byId('workspacePage')) { window.showPage('workspacePage'); return; }
    var modalEl = byId('cmsDetailModal');
    if (!modalEl) { popup('Complaint Detail','Workspace HTML not found.'); return; }
    try { new bootstrap.Modal(modalEl).show(); }
    catch(e){ modalEl.style.display='block'; modalEl.classList.add('show'); }
  }

  function loadDetailSections(complaintNo){
    loadActionAlerts(complaintNo);
    loadLifecycleActions(complaintNo);
    loadComplaintTrackingUi(complaintNo);
    loadCmsHistory(complaintNo);
    loadInfoRequestModule(complaintNo);
    loadP4Workspace(complaintNo);
  }

  window.loadCmsHistory = function(complaintNo){
    google.script.run.withSuccessHandler(function(rows){
      var box=byId('historyBox'); if(!box) return;
      rows = rows || [];
      box.innerHTML = rows.length ? rows.map(function(h){return '<div class="history-item"><b>'+esc(h.oldStatus||'—')+' → '+esc(h.newStatus||'—')+'</b><div>'+esc(h.remark||'')+'</div><small>'+esc(h.user||'System')+' • '+esc(h.time||'')+'</small></div>';}).join('') : '<div class="text-muted">No history found</div>';
    }).withFailureHandler(function(err){ var box=byId('historyBox'); if(box) box.innerHTML='<div class="text-danger">'+esc((err&&err.message)||'History load failed')+'</div>'; }).getCmsComplaintHistory(complaintNo);
  };

  window.loadComplaintTrackingUi = function(complaintNo){
    google.script.run.withSuccessHandler(function(res){
      var stageBox=byId('stageProgress'), logBox=byId('trackingLogList'); if(!stageBox||!logBox) return;
      if(!res || res.status!=='success'){ stageBox.innerHTML='<div class="text-danger small">Tracking data not available</div>'; return; }
      stageBox.innerHTML=(res.stages||[]).map(function(s){ var cls=String(s.status||'Pending').toLowerCase(); var icon=s.status==='Done'?'✓':(s.status==='Active'?'•':''); return '<div class="stage-box '+cls+'"><div class="stage-circle">'+icon+'</div><div class="stage-name">'+esc(s.stage)+'</div></div>'; }).join('');
      var logs=res.logs||[];
      logBox.innerHTML=logs.length?logs.map(function(l){ return '<div class="log-row"><div><div class="log-date">'+esc((l.time||'').split(' ')[0]||'—')+'</div><div class="log-time">'+esc((l.time||'').split(' ').slice(1).join(' '))+'</div></div><div class="log-dot">✓</div><div><div class="log-stage">'+esc(l.newStatus||l.stage||'—')+'</div><div class="log-remarks">'+esc(l.remark||'')+'</div><div class="log-remarks">Updated by: '+esc(l.user||'System')+'</div></div></div>'; }).join(''):'<div class="text-muted small py-2">No routing steps found.</div>';
    }).withFailureHandler(function(err){ var box=byId('stageProgress'); if(box) box.innerHTML='<div class="text-danger">'+esc((err&&err.message)||'Tracking load failed')+'</div>'; }).getCmsComplaintTracking(complaintNo);
  };


  window.loadActionAlerts = function(complaintNo){
    var panel = byId('actionAlertPanel');
    var list = byId('actionAlertList');
    var noteBox = byId('notificationFeed');
    if(panel) panel.classList.add('d-none');
    if(list) list.innerHTML = '<div class="text-muted small">Checking alerts...</div>';
    google.script.run.withSuccessHandler(function(res){
      if(!res || res.status !== 'success') return;
      var alerts = res.alerts || [];
      var notes = res.notifications || [];
      if(panel) panel.classList.remove('d-none');
      if(list){
        if(!alerts.length) list.innerHTML = '<div class="action-alert ok"><b>No immediate action alert.</b><span>Current workflow is clear for your role.</span></div>';
        else list.innerHTML = alerts.map(function(a){return '<div class="action-alert '+esc(a.level||'info')+'"><b>'+esc(a.title||'Alert')+'</b><span>'+esc(a.message||'')+'</span>'+(a.requestId?'<em>Request: '+esc(a.requestId)+'</em>':'')+'</div>';}).join('');
      }
      if(noteBox){
        noteBox.innerHTML = notes.length ? notes.map(function(n){return '<div class="notification-row"><b>'+esc(n.title||n.type||'Notification')+'</b><span>'+esc(n.message||'')+'</span><small>'+esc(n.createdBy||'System')+' • '+esc(n.time||'')+'</small></div>';}).join('') : '<div class="text-muted small">No recent request notifications.</div>';
      }
    }).withFailureHandler(function(err){ if(list) list.innerHTML='<div class="action-alert danger"><b>Alert load failed</b><span>'+esc((err&&err.message)||'Unable to load alerts')+'</span></div>'; }).getCmsComplaintAlerts(complaintNo);
  };

  window.loadLifecycleActions = function(complaintNo){
    google.script.run.withSuccessHandler(function(res){
      if(!res || res.status!=='success') return;
      setText('lifecycleCurrentStage', res.currentStage || '—'); setText('lifecycleStageOwner', res.stageOwner || '—'); setText('lifecycleCapaStatus', res.capaSubStatus ? (res.capaSubStatus + (res.capaVersion ? ' · V'+res.capaVersion : '')) : 'Not started');
      var box=byId('lifecycleActions'); if(!box) return;
      var actions=res.actions||[];
      if(!actions.length){ box.innerHTML='<div class="lifecycle-empty">No action is pending for your role at this stage.</div>'; return; }
      box.innerHTML=actions.map(function(a){ var cls=a.code==='REOPEN_CASE'?'admin':(a.code==='REQUEST_CAPA_REVISION'?'warning':''); return '<button class="lifecycle-action '+cls+'" onclick="runLifecycleAction(\''+esc(a.code)+'\','+(a.remarkRequired?'true':'false')+')">'+esc(a.label)+'</button>'; }).join('');
    }).withFailureHandler(function(err){ var box=byId('lifecycleActions'); if(box) box.innerHTML='<div class="lifecycle-empty text-danger">'+esc((err&&err.message)||'Action load failed')+'</div>'; }).getAllowedCmsLifecycleActions(complaintNo);
  };

  window.runLifecycleAction = function(actionCode, remarkRequired){
    var c=window.CURRENT_COMPLAINT; if(!c) return;
    var remark=getVal('lifecycleRemark'); if(remarkRequired && !remark){ popup('Remark Required','Please enter action remark first.'); return; }
    if(!confirm('Confirm this action?')) return;
    window.showLoader(true);
    google.script.run.withSuccessHandler(function(res){ window.showLoader(false); popup('Updated', (res&&res.message)||'Action completed', function(){ window.loadCmsTrackingV2(function(){ loadDetailSections(c.complaintNo); }); }); }).withFailureHandler(function(err){ window.showLoader(false); popup('Action Failed',(err&&err.message)||'Lifecycle action failed'); }).executeCmsLifecycleAction(c.complaintNo, actionCode, remark);
  };

  window.loadInfoRequestModule = function(complaintNo){
    google.script.run.withSuccessHandler(function(res){
      var box=byId('infoRequestContent'); if(!box) return;
      setText('infoRequestCounter', ((res&&res.requestCount)||0)+' / '+((res&&res.maxRequests)||3)+' Requests');
      if(!res || res.status!=='success'){ box.innerHTML='<div class="info-empty">Info request module not available.</div>'; return; }
      var reqs=res.requests||[];
      var p=res.permissions||{};
      renderRequestMiniTimeline(reqs, res.maxRequests || 3);
      renderWorkspaceChatPanel(reqs, res.activeRequest);
      var html='';
      html += renderInfoSummary(res);
      if(p.canRaise){ html += renderRaiseRequestForm(res); }
      else { html += renderInfoHelp(res); }
      if(!reqs.length){ html += '<div class="info-empty">No information request raised yet. QA can raise a request during review stage.</div>'; }
      else { html += '<div class="request-timeline">' + reqs.map(function(r){ return renderInfoRequestCard(r,p); }).join('') + '</div>'; }
      box.innerHTML=html;
    }).withFailureHandler(function(err){ var box=byId('infoRequestContent'); if(box) box.innerHTML='<div class="text-danger">'+esc((err&&err.message)||'Info request load failed')+'</div>'; }).getCmsInfoRequestModule(complaintNo);
  };

  function renderInfoSummary(res){
    var active = res.activeRequest;
    var badge = active ? ('Active: '+active.status+' · '+active.requestId) : 'No active request';
    var cls = active ? (active.status==='Sales Responded'?'review':'active') : 'clear';
    var text = active ? (active.status==='Sales Responded' ? 'Sales has submitted a response. QA review is pending.' : 'Sales response is pending. Investigation is blocked until closure.') : 'Request channel is clear. QA may raise a request or continue workflow as allowed.';
    return '<div class="info-flow-summary '+cls+'"><div><b>'+esc(badge)+'</b><span>'+esc(text)+'</span></div><div class="info-progress"><b>'+esc(res.remainingRequests||0)+'</b><small>cycles left</small></div></div>';
  }

  function renderRaiseRequestForm(res){
    return '<div class="info-form polished">'
      + '<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2"><b>Raise New Information Request</b><span class="small text-muted">One active request allowed · max three cycles</span></div>'
      + '<label>Request Template</label><select id="infoReqTemplate" class="form-select" onchange="applyInfoRequestTemplate()"><option value="">Select quick template</option><option value="sample">Sample availability / complaint sample confirmation</option><option value="photos">Photos or video evidence required</option><option value="lot">Lot / batch / invoice / dispatch details</option><option value="customer">Customer observation and usage condition</option></select>'
      + '<label class="mt-2">Question / Required Information *</label><textarea id="newInfoQuestion" class="form-control" rows="3" placeholder="Write clearly what Sales must confirm or collect from customer/hospital."></textarea>'
      + '<label class="mt-2">Attachment optional</label><input id="newInfoFile" type="file" class="form-control" accept=".pdf,.doc,.docx,image/*">'
      + '<div class="info-actions"><button class="btn-primary-custom" onclick="raiseInfoRequestQuick()">Raise Request & Notify Sales</button></div>'
      + '</div>';
  }

  function renderInfoHelp(res){
    var active = res.activeRequest;
    if(active) return '<div class="info-help">Active request must be completed before another request can be raised.</div>';
    if((res.requestCount||0) >= (res.maxRequests||3)) return '<div class="info-help warn">Maximum 3 information request cycles used.</div>';
    return '<div class="info-help">No request action is currently available for your role/stage.</div>';
  }
  function renderRequestMiniTimeline(reqs, maxReq){
    var box = byId('requestMiniTimeline'); if(!box) return;
    reqs = reqs || []; maxReq = maxReq || 3;
    var byNo = {}; reqs.forEach(function(r){ byNo[Number(r.requestNo||0)] = r; });
    var html = '';
    for(var i=1;i<=maxReq;i++){
      var r = byNo[i];
      var status = r ? (r.status || 'Open') : 'Not Used';
      var cls = r ? requestStatusClass(status) : 'not-used';
      var icon = status === 'Closed' ? '✓' : (status === 'Sales Responded' ? '↩' : (r ? '!' : '•'));

  window.fetchBatch = function(){
    var batch = getVal('batchNo').toUpperCase();
    if(!batch) return;
    var btn = document.querySelector('.fetch-btn');
    if(btn){ btn.disabled=true; btn.dataset.oldText=btn.innerText; btn.innerText='Fetching...'; }
    window.showLoader(true);

    google.script.run
      .withSuccessHandler(function(res){
        window.showLoader(false);
        if(btn){ btn.disabled=false; btn.innerText=btn.dataset.oldText||'Fetch'; }

        var list = (res && Array.isArray(res.itemNames)) ? res.itemNames : [];
        var item = byId('itemName'), man = byId('itemNameManual');
        if(!item || !man) return;

        item.innerHTML = '';
        item.classList.remove('d-none');
        man.classList.add('d-none');

        if(list.length > 0){
          if(list.length > 1){
            item.appendChild(new Option('Select Item Name',''));
          }
          list.forEach(function(name){ item.appendChild(new Option(name,name)); });
          item.value = list.length === 1 ? list[0] : '';
        } else {
          item.classList.add('d-none');
          man.classList.remove('d-none');
          man.value = '';
          man.focus();
        }
      })
      .withFailureHandler(function(err){
        window.showLoader(false);
        if(btn){ btn.disabled=false; btn.innerText=btn.dataset.oldText||'Fetch'; }
        window.showError((err && err.message) || 'Batch lookup failed');
      })
      .getBatchLookupData(batch);

    readMultiFiles('imageFiles').then(function(img){ payload.images=img; return readMultiFiles('videoFiles'); }).then(function(vid){ payload.videos=vid; google.script.run.withSuccessHandler(function(res){ window.showLoader(false); if(res&&res.status==='success'){ window.showSuccess('✅ Complaint Submitted','Your complaint has been submitted successfully.',res.complaintNo); window.clearForm(); window.loadCmsTrackingV2(); } else window.showError((res&&res.message)||'Submission failed'); }).withFailureHandler(function(err){ window.showLoader(false); window.showError((err&&err.message)||'Server error during submission'); }).submitComplaint(payload); });

    ['emailField','passwordField'].forEach(function(id){ var el = byId(id); if (el) el.addEventListener('keydown', function(e){ if (e.key === 'Enter') window.cmsLoginNow(e); }); });
    if (byId('dashboardPage') && (!byId('loginBox') || byId('loginBox').style.display === 'none')) window.loadCmsTrackingV2();

<script>
/* =====================================================================
   P5.5.3 FIX - Old batch fetch + centered S&IP-style Hospital Search
   ===================================================================== */
(function(){
  'use strict';
  function byId(id){ return document.getElementById(id); }
  function val(id){ var el=byId(id); return el ? String(el.value||'').trim() : ''; }
  function html(v){ return String(v == null ? '' : v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c];}); }
  function loader(on){ if(window.showLoader) window.showLoader(!!on); }
  function errMsg(err){ return (err && err.message) ? err.message : String(err || 'Unknown error'); }

  function ensureHospitalSearchUi(){
    if(!byId('cmsHospitalModal')){
      var modal=document.createElement('div');
      modal.id='cmsHospitalModal';
      modal.className='cms-hospital-modal';
      modal.innerHTML =
        '<div class="cms-hospital-card">'+
          '<div class="cms-hospital-head">'+
            '<div><div class="cms-hospital-title">Find Hospital / Customer</div><div style="font-size:12px;opacity:.9">Master first, Google second. Google selections are saved to Hospital Master.</div></div>'+
            '<button class="cms-hospital-x" type="button" onclick="closeCmsHospitalModal()">×</button>'+
          '</div>'+
          '<div class="cms-hospital-search">'+
            '<input type="text" id="cmsHospitalModalSearch" placeholder="Type hospital/customer name">'+
            '<button class="cms-hospital-btn secondary" type="button" onclick="searchCmsHospitalMasterFromModal()">Search Master</button>'+
            '<button class="cms-hospital-btn primary" type="button" onclick="searchCmsGoogleHospitalFromModal()">Search Google</button>'+
          '</div>'+
          '<div id="cmsHospitalSearchResults" class="cms-hospital-results"></div>'+
          '<div class="cms-hospital-foot"><button class="cms-hospital-btn secondary" type="button" onclick="closeCmsHospitalModal()">Close</button></div>'+
        '</div>';
      document.body.appendChild(modal);
    }

    if(!byId('googlePlaceId')){
      var hid=document.createElement('input'); hid.type='hidden'; hid.id='googlePlaceId';
      var loc=byId('location'); if(loc && loc.parentNode) loc.parentNode.appendChild(hid); else document.body.appendChild(hid);
    }

    var loc=byId('location');
    if(loc && !byId('cmsFindHospitalBtn')){
      var parent=loc.parentNode;
      var wrap=document.createElement('div');
      wrap.className='cms-find-wrap';
      parent.insertBefore(wrap, loc);
      wrap.appendChild(loc);
      var btn=document.createElement('button');
      btn.id='cmsFindHospitalBtn'; btn.type='button'; btn.className='fetch-btn'; btn.textContent='Find';
      btn.onclick=window.openCmsHospitalModal;
      wrap.appendChild(btn);
      var hint=byId('placesHint');
      if(hint){ hint.textContent='Use Find to search Hospital Master first, then Google if needed.'; hint.style.color='#0f766e'; }
    }
  }

  // Old practical behavior: every Fetch click calls backend directly; no cache popup, no same-batch block.
  window.fetchBatch = function(){
    var batch=val('batchNo').toUpperCase();
    if(!batch) return;
    var btn=document.querySelector('.fetch-btn[onclick="fetchBatch()"], button[onclick="fetchBatch()"]');
    if(btn){ btn.disabled=true; btn.dataset.oldText=btn.innerText; btn.innerText='Fetching...'; }
    loader(true);
    google.script.run
      .withSuccessHandler(function(res){
        loader(false); if(btn){ btn.disabled=false; btn.innerText=btn.dataset.oldText||'Fetch'; }
        var item=byId('itemName'), man=byId('itemNameManual');
        var list=(res && Array.isArray(res.itemNames)) ? res.itemNames : [];
        if(!item || !man) return;
        item.innerHTML=''; item.classList.remove('d-none'); man.classList.add('d-none');
        if(list.length){
          if(list.length>1) item.appendChild(new Option('Select Item Name',''));
          list.forEach(function(name){ item.appendChild(new Option(name,name)); });
          item.value=list.length===1 ? list[0] : '';
        } else {
          item.classList.add('d-none'); man.classList.remove('d-none'); man.value=''; man.placeholder='Enter Item Name manually'; man.focus();
        }
      })
      .withFailureHandler(function(e){ loader(false); if(btn){ btn.disabled=false; btn.innerText=btn.dataset.oldText||'Fetch'; } if(window.showError) window.showError(errMsg(e)); else alert(errMsg(e)); })
      .getBatchLookupData(batch);
  };

  window.openCmsHospitalModal = function(){
    ensureHospitalSearchUi();
    var q=val('location');
    byId('cmsHospitalModal').classList.add('show');
    byId('cmsHospitalModalSearch').value=q;
    byId('cmsHospitalSearchResults').innerHTML='<div class="cms-hospital-empty">Searching Hospital Master...</div>';
    window.searchCmsHospitalMasterFromModal();
  };
  window.closeCmsHospitalModal = function(){ var m=byId('cmsHospitalModal'); if(m) m.classList.remove('show'); };

  function renderHospitalResults(rows, source){
    var box=byId('cmsHospitalSearchResults');
    rows=rows||[];
    if(!rows.length){ box.innerHTML='<div class="cms-hospital-empty">No results found.</div>'; return; }
    box.innerHTML=rows.map(function(h){
      var encoded=encodeURIComponent(JSON.stringify(h));
      return '<div class="cms-hospital-result">'+
        '<div class="cms-hospital-result-title">'+html(h.hospitalName||h.name||'')+'</div>'+
        '<div class="cms-hospital-result-address">'+html(h.address||'')+'</div>'+
        '<div class="cms-hospital-result-meta"><span>'+html(h.source||source||'')+'</span>'+(h.phoneNumber?'<span>Phone: '+html(h.phoneNumber)+'</span>':'')+(h.rating?'<span>Rating: '+html(h.rating)+'</span>':'')+'</div>'+
        '<button class="cms-hospital-select" type="button" onclick="selectCmsHospitalFromModal(\''+encoded+'\')">Select</button>'+ 
      '</div>';
    }).join('');
  }

  window.searchCmsHospitalMasterFromModal = function(){
    var q=val('cmsHospitalModalSearch') || val('location');
    var box=byId('cmsHospitalSearchResults');
    if(!box) return;
    if(!q){ box.innerHTML='<div class="cms-hospital-empty">Type hospital/customer name first.</div>'; return; }
    box.innerHTML='<div class="cms-hospital-empty">Searching Hospital Master...</div>';
    google.script.run
      .withSuccessHandler(function(rows){ rows=rows||[]; if(!rows.length){ box.innerHTML='<div class="cms-hospital-empty">No hospital found in master. Click Search Google.</div>'; return; } renderHospitalResults(rows,'MASTER'); })
      .withFailureHandler(function(e){ box.innerHTML='<div class="cms-hospital-empty">Master Error: '+html(errMsg(e))+'</div>'; })
      .searchCmsHospitalMaster(q);
  };

  window.searchCmsGoogleHospitalFromModal = function(){
    var q=val('cmsHospitalModalSearch') || val('location');
    var box=byId('cmsHospitalSearchResults');
    if(!box) return;
    if(!q){ box.innerHTML='<div class="cms-hospital-empty">Type hospital/customer name first.</div>'; return; }
    box.innerHTML='<div class="cms-hospital-empty">Searching Google...</div>';
    google.script.run
      .withSuccessHandler(function(rows){ rows=rows||[]; if(!rows.length){ box.innerHTML='<div class="cms-hospital-empty">No result found from Google.</div>'; return; } renderHospitalResults(rows,'GOOGLE'); })
      .withFailureHandler(function(e){ box.innerHTML='<div class="cms-hospital-empty">Google Error: '+html(errMsg(e))+'</div>'; })
      .searchCmsGoogleHospitals(q);
  };

  window.selectCmsHospitalFromModal = function(encoded){
    var h=JSON.parse(decodeURIComponent(encoded));
    if(String(h.source||'').toUpperCase()==='GOOGLE' && h.placeId){
      loader(true);
      google.script.run
        .withSuccessHandler(function(details){ loader(false); fillCmsHospitalDetails(details||h); window.closeCmsHospitalModal(); })
        .withFailureHandler(function(e){ loader(false); if(window.showError) window.showError(errMsg(e)); else alert(errMsg(e)); })
        .getCmsGoogleHospitalDetails(h.placeId);
      return;
    }
    // Master selection can also touch Last Selected At in backend when ID/place exists.
    if(h.hospitalId || h.placeId){
      google.script.run.withSuccessHandler(function(details){ fillCmsHospitalDetails(details||h); }).withFailureHandler(function(){ fillCmsHospitalDetails(h); }).saveCmsHospitalToMaster(h);
    } else {
      fillCmsHospitalDetails(h);
    }
    window.closeCmsHospitalModal();
  };

  function fillCmsHospitalDetails(h){
    h=h||{};
    if(byId('location')) byId('location').value = h.hospitalName || h.name || '';
    if(byId('address')) byId('address').value = h.address || '';
    if(byId('city')) byId('city').value = h.city || '';
    if(byId('state')) byId('state').value = h.state || '';
    if(byId('pincode')) byId('pincode').value = h.pincode || '';
    if(byId('googlePlaceId')) byId('googlePlaceId').value = h.placeId || '';
  }

  document.addEventListener('keydown', function(e){ if(e.key==='Escape') window.closeCmsHospitalModal(); });
  window.addEventListener('DOMContentLoaded', ensureHospitalSearchUi);
})();
</script>

les-responded{border-color:#93c5fd;background:#eff6ff}.req-mini.closed{border-color:#86efac;background:#f0fdf4}@media(max-width:1100px){.fast-timeline-grid,.fast-action-grid{grid-template-columns:1fr}.fast-upload-row{grid-template-columns:1fr}}

<script>
(function(){
  function byId(id){return document.getElementById(id)}
  function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]})}
  function val(id){var e=byId(id);return e&&typeof e.value==='string'?e.value.trim():''}
  function safeJs(v){return String(v==null?'':v).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
  function publicTrackingUrl(complaintNo){ return window.location.href.split('?')[0] + '?track=' + encodeURIComponent(complaintNo || ''); }
  function setHtml(id,html){var e=byId(id); if(e)e.innerHTML=html}
  function setText(id,txt){var e=byId(id); if(e)e.innerText=txt}
  function popup(t,m,cb){ if(window.showInfo) return window.showInfo(t,m); alert((t?t+'\n':'')+(m||'')); if(cb)cb(); }
  function fileToDataUrl(id){return new Promise(function(resolve,reject){var el=byId(id),f=el&&el.files&&el.files[0]; if(!f)return resolve(''); var r=new FileReader(); r.onload=function(e){resolve(e.target.result)}; r.onerror=reject; r.readAsDataURL(f);});}
  function showWorkspace(){ if(window.showPage) window.showPage('workspacePage'); else { var p=byId('workspacePage'); if(p)p.classList.add('active'); } }

  function renderCaseHero(c){
    setText('detailTitle', c.complaintNo||'—');
    setText('trackingSubTitle','Complaint No: '+(c.complaintNo||'—'));
    var html='<div class="cms-detail-hero investigation"><div class="cms-detail-main"><div class="detail-kicker">Complaint / CAPA Case</div><h4>'+esc(c.complaintNo||'—')+'</h4><div class="detail-hero-grid">'
      +'<div><span>Customer</span><b>'+esc(c.customer||'—')+'</b></div><div><span>Product</span><b>'+esc(c.product||'—')+'</b></div><div><span>Batch</span><b>'+esc(c.batch||'—')+'</b></div><div><span>Severity</span><b>'+esc(c.severity||'—')+'</b></div>'
      +'</div></div><div class="cms-detail-status"><div class="stage-pill big">'+esc(c.status||'Complaint Booked')+'</div><div class="small mt-2">Owner: <b>'+esc(c.stageOwner||'—')+'</b></div><div class="small">CAPA: <b>'+esc(c.capaSubStatus||'Not started')+'</b></div></div></div>'
      +'<div class="fast-case-links"><a class="btn-soft" target="_blank" href="'+esc(c.pdfUrl||'#')+'">Open PDF</a><a class="btn-soft" target="_blank" href="'+esc(c.folderUrl||'#')+'">Open Folder</a><a class="btn-soft" target="_blank" href="'+esc(publicTrackingUrl(c.complaintNo))+'">Public Tracking</a><button class="btn-soft" type="button" onclick="copyPublicTrackingLink()">Copy Tracking Link</button></div>';
    setHtml('detailBody',html);
  }

  function renderTracking(stages, logs){
    setHtml('stageProgress',(stages||[]).map(function(s){var cls=String(s.status||'Pending').toLowerCase();var icon=s.status==='Done'?'✓':(s.status==='Active'?'•':'');return '<div class="stage-box '+cls+'"><div class="stage-circle">'+icon+'</div><div class="stage-name">'+esc(s.stage)+'</div></div>'}).join(''));
    setHtml('trackingLogList',(logs||[]).map(function(l){return '<div class="log-row"><div><div class="log-date">'+esc((l.time||'').split(' ')[0]||'—')+'</div><div class="log-time">'+esc((l.time||'').split(' ').slice(1).join(' '))+'</div></div><div class="log-dot">✓</div><div><div class="log-stage">'+esc(l.newStatus||l.stage||'—')+'</div><div class="log-remarks">'+esc(l.remark||'')+'</div><div class="log-remarks">Updated by: '+esc(l.user||'System')+'</div></div></div>'}).join('') || '<div class="text-muted small">No routing steps.</div>');
  }

  function renderRequestTimeline(info){
    info=info||{}; var requests=info.requests||[]; setText('infoRequestCounter',(info.requestCount||0)+' / '+(info.maxRequests||3)+' Requests');
    var html=''; for(var i=1;i<=3;i++){var r=requests.find(function(x){return Number(x.requestNo)===i}); var cls=r?String(r.status||'open').toLowerCase().replace(/\s+/g,'-'):'not-used'; html+='<div class="req-mini '+cls+'"><div class="dot"></div><b>Request '+i+'</b><div class="small">'+esc(r?r.status:'Not Used')+'</div></div>'} setHtml('requestMiniTimeline',html);
  }

  function renderInfo(info){
    info=info||{}; var p=info.permissions||{}; var active=info.activeRequest; var reqs=info.requests||[]; var html='';
    if(p.canRaise){html+='<div class="fast-info-card active"><b>Raise More Info Request</b><textarea id="newInfoQuestion" class="form-control mt-2" rows="3" placeholder="Write what information is required from Sales"></textarea><input id="newInfoFile" type="file" class="form-control mt-2"><button class="btn-primary-custom mt-2" onclick="raiseInfoRequestFast()">Raise Request</button></div>'}
    if(!p.canRaise && !active){html+='<div class="fast-info-card"><b>No active request</b><div class="small text-muted">Request channel is clear or not available for this stage/role.</div></div>'}
    reqs.forEach(function(r){var sid=safeJs(r.requestId); html+='<div class="fast-info-card '+(r.status==='Open'||r.status==='Reopened'?'active':'')+' mt-2"><b>'+esc(r.requestId)+'</b> <span class="status-badge">'+esc(r.status)+'</span><div class="mt-1">'+esc(r.qaQuestion||'')+'</div>';
      if(r.permissions&&r.permissions.canRespond){html+='<textarea id="salesResp_'+sid+'" class="form-control mt-2" rows="3" placeholder="Sales response"></textarea><input id="salesRespFile_'+sid+'" type="file" class="form-control mt-2"><button class="btn-primary-custom mt-2" onclick="respondInfoRequestFast(\''+sid+'\')">Submit Response</button>'}
      if(r.permissions&&r.permissions.canReview){html+='<textarea id="qaReview_'+sid+'" class="form-control mt-2" rows="2" placeholder="QA review/reopen reason"></textarea><button class="btn-primary-custom mt-2 me-2" onclick="reviewInfoRequestFast(\''+sid+'\',\'ACCEPT\')">Accept & Close</button><button class="btn-outline mt-2" onclick="reviewInfoRequestFast(\''+sid+'\',\'REOPEN\')">Reopen</button>'}
      html+='</div>'});
    setHtml('infoRequestContent',html);
    renderChat(reqs);
  }
  function renderChat(reqs){var all=[];(reqs||[]).forEach(function(r){(r.messages||[]).forEach(function(m){m._status=r.status;all.push(m)})});setHtml('workspaceChatPanel',all.length?all.map(function(m){var isSales=String(m.senderRole||'').toLowerCase().indexOf('sales')>=0;return '<div class="chat-msg '+(isSales?'sales':'')+'"><b>'+esc(m.type||'Comment')+'</b><div>'+esc(m.message||'')+'</div><small>'+esc(m.senderName||'')+' • '+esc(m.time||'')+'</small>'+(m.attachmentUrl?'<br><a target="_blank" href="'+esc(m.attachmentUrl)+'">Attachment</a>':'')+'</div>'}).join(''):'<div class="chat-empty">No request conversation yet.</div>')}

  function renderStageActions(data){var html=''; var actions=data.stageActions||[]; if(actions.length){html+='<div class="fast-action-buttons">'+actions.map(function(a){return '<button onclick="runFastStageAction(\''+safeJs(a.code)+'\','+(a.remarkRequired?'true':'false')+')">'+esc(a.label)+'</button>'}).join('')+'</div><textarea id="fastStageRemark" class="form-control mt-2" rows="2" placeholder="Optional remark"></textarea>'} else {html+='<div class="info-empty">No stage action is pending for your role.</div>'} setHtml('simpleNextAction',html)}

  function renderCapa(data){var c=data.capa||{}; var latest=c.latest; var html=''; if(latest){html+='<div class="fast-capa-card"><b>Latest CAPA: V'+esc(latest.version||'')+'</b><div>Status: '+esc(latest.status||data.capaSubStatus||'')+'</div>'+(latest.documentUrl?'<a class="btn-soft mt-2" target="_blank" href="'+esc(latest.documentUrl)+'">View CAPA</a>':'')+'</div>'} else html+='<div class="fast-capa-card">No CAPA document uploaded yet.</div>';
    if(c.canUpload){html+='<div class="fast-upload-row"><div><label>CAPA Document</label><input id="fastCapaFile" type="file" class="form-control"><textarea id="fastCapaRemark" class="form-control mt-2" rows="2" placeholder="Optional CAPA remark"></textarea></div><button class="btn-primary-custom" onclick="uploadFastCapa()">Upload CAPA</button></div>'}
    if(c.canSalesAction){html+='<textarea id="fastSalesRemark" class="form-control mt-2" rows="2" placeholder="Optional approval remark / revision reason"></textarea><div class="fast-action-buttons mt-2"><button onclick="approveFastCapa()">Approve CAPA & Close</button><button class="warn" onclick="reviseFastCapa()">Request Revision</button></div>'}
    var hist=c.history||[]; if(hist.length>1){html+='<details class="mt-2"><summary>CAPA Version History</summary>'+hist.map(function(h){return '<div class="fast-capa-card"><b>V'+esc(h.version||'')+'</b> '+esc(h.status||'')+(h.documentUrl?' <a target="_blank" href="'+esc(h.documentUrl)+'">Open</a>':'')+'</div>'}).join('')+'</details>'} setHtml('p4WorkspaceContent',html)}

  window.openCmsDetail=function(complaintNo){var c=(window.CMS_ROWS||[]).find(function(x){return String(x.complaintNo)===String(complaintNo)}); if(!c){popup('Complaint Detail','Complaint not found. Refresh list once.');return;} window.CURRENT_COMPLAINT=c; renderCaseHero(c); ['stageProgress','requestMiniTimeline','simpleNextAction','infoRequestContent','p4WorkspaceContent','workspaceChatPanel'].forEach(function(id){setHtml(id,'<div class="text-muted small py-2">Loading...</div>')}); showWorkspace(); window.showLoader(true); google.script.run.withSuccessHandler(function(res){window.showLoader(false); if(!res||res.status!=='success'){popup('Load failed',(res&&res.message)||'Unable to load workspace');return;} renderTracking((res.tracking||{}).stages,(res.tracking||{}).logs); renderRequestTimeline(res.info); renderStageActions(res); renderInfo(res.info); renderCapa(res);}).withFailureHandler(function(e){window.showLoader(false);popup('Load failed',(e&&e.message)||'Workspace load failed')}).getCmsFastWorkspaceData(complaintNo)};

function runFastStageAction(actionCode, complaintNo) {
  complaintNo = complaintNo || (window.CMS_ACTIVE_COMPLAINT && window.CMS_ACTIVE_COMPLAINT.complaintNo) || '';
  actionCode = String(actionCode || '').trim();

  if (!complaintNo) {
    showError('Complaint number missing.');
    return;
  }

  const remarkBox = document.getElementById('fastStageRemark');
  const remark = remarkBox ? remarkBox.value.trim() : '';

  const payload = {
    complaintNo: complaintNo,
    actionCode: actionCode,
    remark: remark
  };

  showLoader(true, 'Updating stage...');

  google.script.run
    .withSuccessHandler(function(res) {
      showLoader(false);

      if (!res || res.status === 'error') {
        showError((res && res.message) ? res.message : 'Stage update failed.');
        return;
      }

      showSuccess('Stage updated successfully.');
      if (typeof loadFastWorkspace === 'function') {
        loadFastWorkspace(complaintNo);
      } else if (typeof openComplaintWorkspace === 'function') {
        openComplaintWorkspace(complaintNo);
      }
    })
    .withFailureHandler(function(err) {
      showLoader(false);
      showError((err && err.message) ? err.message : String(err || 'Stage update failed.'));
    })
    .executeCmsLifecycleAction(payload);
}

function updateDashboardCardsFromRows(rows) {
  rows = Array.isArray(rows) ? rows : [];

  const total = rows.length;

  const closed = rows.filter(function(r) {
    const s = String(r.status || r.currentStage || '').toLowerCase();
    return s.indexOf('closed') >= 0 || s.indexOf('case closed') >= 0;
  }).length;

  const open = rows.filter(function(r) {
    const s = String(r.status || r.currentStage || '').toLowerCase();
    return s && s.indexOf('closed') < 0 && s.indexOf('case closed') < 0;
  }).length;

  const overdue = rows.filter(function(r) {
    const age = Number(r.ageDays || r.age || 0);
    const s = String(r.status || r.currentStage || '').toLowerCase();
    return age > 30 && s.indexOf('closed') < 0;
  }).length;

  setTextSafe('dashTotal', total);
  setTextSafe('dashOpen', open);
  setTextSafe('dashClosed', closed);
  setTextSafe('dashOverdue', overdue);
}

function setTextSafe(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value;
}

  window.raiseInfoRequestFast=function(){var c=window.CURRENT_COMPLAINT;if(!c)return;var q=val('newInfoQuestion');if(!q){popup('Required','Write request details.');return;}fileToDataUrl('newInfoFile').then(function(file){window.showLoader(true);google.script.run.withSuccessHandler(function(res){window.showLoader(false);popup('Request Raised',(res&&res.message)||'Request raised');window.openCmsDetail(c.complaintNo)}).withFailureHandler(function(e){window.showLoader(false);popup('Failed',(e&&e.message)||'Request failed')}).raiseCmsInfoRequest(c.complaintNo,q,file)})};

  window.reviewInfoRequestFast=function(id,decision){var c=window.CURRENT_COMPLAINT;var comment=val('qaReview_'+id);if(decision==='REOPEN'&&!comment){popup('Required','Reopen reason is required');return;}window.showLoader(true);google.script.run.withSuccessHandler(function(res){window.showLoader(false);popup('Request Updated',(res&&res.message)||'Request updated');window.openCmsDetail(c.complaintNo)}).withFailureHandler(function(e){window.showLoader(false);popup('Failed',(e&&e.message)||'Review failed')}).reviewCmsInfoRequest(id,decision,comment)};
