<!-- P6.4 Dashboard + More Info Chat + Notification + Data Fill Hotfix -->
<style>
#notifyModal .modal-header{background:linear-gradient(135deg,#0f766e,#0d9488);color:#fff;border:0}#notifyModal .btn-close{filter:invert(1)}#notifyModal .modal-content{border:0!important;box-shadow:0 24px 70px rgba(15,23,42,.25)}
.p64-case{background:linear-gradient(135deg,#075e57,#0f8d86);color:#fff;border-radius:22px;padding:18px;box-shadow:0 14px 32px rgba(15,118,110,.18)}
.p64-case-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}.p64-case h2{font-size:24px;margin:3px 0 8px;font-weight:950}.p64-status{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:16px;padding:12px;min-width:230px}.p64-chip{display:inline-flex;border-radius:999px;background:#fff;color:#075e57;padding:8px 12px;font-weight:950;font-size:12px}.p64-info-grid{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:10px;margin-top:12px}.p64-cell{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:10px}.p64-cell span{display:block;font-size:10px;text-transform:uppercase;opacity:.8;font-weight:900}.p64-cell b{display:block;font-size:13px;margin-top:4px;line-height:1.25}.p64-cell.wide{grid-column:1/-1}.p64-links{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}.p64-btn{border:0;border-radius:12px;padding:10px 14px;font-weight:900;background:#0f766e;color:#fff;text-decoration:none;cursor:pointer}.p64-btn:hover{filter:brightness(1.03)}.p64-btn.soft{background:#dff7f2;color:#075e57}.p64-btn.warn{background:#f59e0b;color:#fff}.p64-btn.danger{background:#dc2626;color:#fff}.p64-btn.secondary{background:#e2e8f0;color:#334155}.p64-btn:disabled{opacity:.55;cursor:not-allowed}
.p64-action-note{border:1px dashed #b9d9d5;border-radius:14px;padding:10px;margin-top:10px;background:#f8fffd}.p64-action-note textarea{width:100%;border:1px solid #cfe3de;border-radius:12px;padding:10px;min-height:72px}.p64-empty{border:1px dashed #cbd5e1;border-radius:14px;background:#f8fafc;padding:12px;color:#64748b}.p64-request-track{display:flex;gap:10px;overflow-x:auto;padding:8px 2px}.p64-req-node{min-width:128px;border:1px solid #dbe7e5;border-radius:15px;padding:10px;background:#f8fafc}.p64-req-node .dot{width:20px;height:20px;border-radius:50%;background:#cbd5e1;margin-bottom:8px}.p64-req-node.open,.p64-req-node.reopened{border-color:#f59e0b;background:#fffbeb}.p64-req-node.open .dot,.p64-req-node.reopened .dot{background:#f59e0b}.p64-req-node.sales-responded{border-color:#93c5fd;background:#eff6ff}.p64-req-node.sales-responded .dot{background:#2563eb}.p64-req-node.closed{border-color:#86efac;background:#f0fdf4}.p64-req-node.closed .dot{background:#16a34a}.p64-chat{display:flex;flex-direction:column;gap:10px;max-height:430px;overflow:auto;padding:10px;background:#eef5f4;border-radius:18px;border:1px solid #d7e7e4}.p64-bubble{max-width:84%;border-radius:16px;padding:10px 12px;background:#fff;border:1px solid #dbe7e5;box-shadow:0 6px 18px rgba(15,23,42,.05)}.p64-bubble.qa{align-self:flex-start;background:#f0fdfa;border-color:#99f6e4}.p64-bubble.sales{align-self:flex-end;background:#e8f3ff;border-color:#bfdbfe}.p64-bubble b{display:block;font-size:12px;margin-bottom:3px}.p64-bubble small{display:block;margin-top:5px;color:#64748b;font-size:11px}.p64-form{border:1px solid #dbe7e5;background:#fff;border-radius:16px;padding:12px;margin-top:10px}.p64-form textarea{width:100%;border:1px solid #cfe3de;border-radius:12px;padding:10px;min-height:86px}.p64-score-fix h2{display:block!important;color:#fff!important}
@media(max-width:900px){.p64-info-grid{grid-template-columns:1fr}.p64-status{min-width:0;width:100%}.p64-case-top{flex-direction:column}}
</style>

<script>
(function(){
  function q(id){return document.getElementById(id)}
  function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
  function first(){for(var i=0;i<arguments.length;i++){var v=arguments[i]; if(v!==undefined&&v!==null&&String(v).trim()!=='')return v;} return ''}
  function set(id,html){var e=q(id); if(e)e.innerHTML=html}
  function text(id,v){var e=q(id); if(e)e.textContent=(v==null?'':String(v))}
  function loader(on){var el=q('loader'); if(el)el.style.display=on?'flex':'none'}
  function value(id){var e=q(id); return e&&typeof e.value==='string'?e.value.trim():''}
  function fileData(id,cb){var e=q(id),f=e&&e.files&&e.files[0]; if(!f)return cb(''); var r=new FileReader(); r.onload=function(ev){cb(ev.target.result)}; r.readAsDataURL(f)}

  function p64Notify(title,msg,onOk){
    title = title || 'CMS'; msg = msg || '';
    var t=q('notifyTitle'), b=q('notifyBody'), f=q('notifyFooter'), m=q('notifyModal');
    if(t&&b&&m&&window.bootstrap){
      t.textContent=title; b.textContent=msg || 'Done';
      if(f) f.innerHTML='<button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>';
      var inst=bootstrap.Modal.getOrCreateInstance(m); m.addEventListener('hidden.bs.modal',function h(){m.removeEventListener('hidden.bs.modal',h); if(typeof onOk==='function')onOk();}); inst.show();
    } else { alert((title?title+'\n':'')+(msg||'Done')); if(typeof onOk==='function')onOk(); }
  }
  window.openNotify = p64Notify;
  window.showSuccess=function(title,msg,complaintNo){ if(arguments.length===1){msg=title; title='✅ Success';} p64Notify(title||'✅ Success',(msg||'Done')+(complaintNo?'\n\nComplaint No: '+complaintNo:'')); };
  window.showError=function(title,msg){ if(arguments.length===1){msg=title; title='❌ CMS Error';} p64Notify(title||'❌ CMS Error',msg||'Something went wrong'); };
  window.showInfo=function(title,msg){ p64Notify(title||'CMS',msg||''); };
  window.showModal=function(title,msg){ p64Notify(title||'CMS',msg||''); };

  function fyFromDate(v){var d=new Date(v); if(isNaN(d))return ''; var y=d.getFullYear(), s=(d.getMonth()+1)>=4?y:y-1; return s+'-'+String(s+1).slice(-2)}
  function buildFyOptions(rows,res){var map={}; (rows||[]).forEach(function(r){var k=r.fy||fyFromDate(r.complaintDate||r.date); if(k)map[k]=1;}); var opts=[{key:'ALL',label:'All FY'}].concat(Object.keys(map).sort().reverse().map(function(k){return{key:k,label:'FY '+k}})); if(res&&res.fyOptions&&res.fyOptions.length){opts=[{key:'ALL',label:'All FY'}].concat(res.fyOptions)} return opts;}
  function fillFy(rows,res){var opts=buildFyOptions(rows,res), current=(res&&res.selectedFY)||window.CURRENT_FY_KEY||'ALL'; ['fyFilter','listFyFilter'].forEach(function(id){var el=q(id); if(!el)return; var old=el.value||current; el.innerHTML=opts.map(function(o){return '<option value="'+esc(o.key)+'">'+esc(o.label||o.key)+'</option>'}).join(''); el.value=opts.some(function(o){return o.key===old})?old:current;});}
  function cards(rows,res){var c=(res&&res.cards)||{}; if(!c.total&&rows&&rows.length){var total=rows.length, closed=rows.filter(function(r){return /closed/i.test(String(r.status||r.currentStage||''))}).length; c={total:total,open:total-closed,closed:closed,overdue:rows.filter(function(r){return Number(r.ageDays||r.age||0)>30&&!/closed/i.test(String(r.status||''))}).length};} text('cmsTotal',c.total||0);text('cmsOpen',c.open||0);text('cmsClosed',c.closed||0);text('cmsOverdue',c.overdue||0); document.querySelectorAll('.score-card').forEach(function(x){x.classList.add('p64-score-fix')});}
  function bars(id,items){var el=q(id); if(!el)return; items=items||[]; el.innerHTML=items.length?items.map(function(x){return '<div class="d-flex justify-content-between align-items-center py-1 border-bottom"><span>'+esc(x.label)+'</span><b>'+esc(x.count||0)+'</b></div>'}).join(''):'<div class="text-muted small">No data</div>';}
  function analytics(rows,res){var a=(res&&res.analytics)||{}, byS=a.byStage||[], byV=a.bySeverity||[]; if(!byS.length){var m={};(rows||[]).forEach(function(r){var k=r.status||'Complaint Booked';m[k]=(m[k]||0)+1});byS=Object.keys(m).map(function(k){return{label:k,count:m[k]}})} if(!byV.length){var n={};(rows||[]).forEach(function(r){var k=r.severity||'NA';n[k]=(n[k]||0)+1});byV=Object.keys(n).map(function(k){return{label:k,count:n[k]}})} bars('stageAnalytics',byS); bars('severityAnalytics',byV);}
  function renderList(rows){var tb=q('complaintTable'); if(!tb)return; rows=rows||[]; if(!rows.length){tb.innerHTML='<tr><td colspan="7" class="text-center text-muted py-3">No complaints found</td></tr>';return;} tb.innerHTML=rows.map(function(c){var cn=String(c.complaintNo||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); return '<tr><td><b>'+esc(c.complaintNo)+'</b><br><small>'+esc(c.date||c.complaintDate||'')+'</small></td><td>'+esc(first(c.customer,c.customerName,c.location,'—'))+'<br><small>'+esc([c.city,c.state].filter(Boolean).join(', '))+'</small></td><td>'+esc(first(c.product,c.itemName,'—'))+'<br><small>Batch: '+esc(first(c.batch,c.batchNo,'—'))+'</small></td><td>'+esc(c.severity||'—')+'</td><td><span class="status-badge active-status">'+esc(c.status||c.currentStage||'Complaint Booked')+'</span></td><td>'+esc(c.ageDays||c.age||0)+' days</td><td><button class="btn-soft" onclick="openCmsDetail(\''+cn+'\')">Track / View</button></td></tr>'}).join('');}

  window.loadCmsTrackingV2=function(done){ loader(true); var fy=(q('fyFilter')&&q('fyFilter').value)||(q('listFyFilter')&&q('listFyFilter').value)||window.CURRENT_FY_KEY||'ALL'; var status=(q('statusFilter')&&q('statusFilter').value)||'ALL'; google.script.run.withSuccessHandler(function(res){loader(false); if(!res||res.status!=='success'){showError((res&&res.message)||'Tracking data load failed');return;} var rows=res.rows||res.data||res.complaints||[]; window.CMS_ROWS=rows; window.CURRENT_FY_KEY=res.selectedFY||fy||'ALL'; fillFy(rows,res); cards(rows,res); renderList(rows); analytics(rows,res); if(typeof done==='function')done();}).withFailureHandler(function(e){loader(false);showError((e&&e.message)||'Complaint list load failed')}).getCmsTrackingData(fy,status);};
  window.changeFinancialYear=function(v){window.CURRENT_FY_KEY=v||'ALL'; if(q('fyFilter'))q('fyFilter').value=window.CURRENT_FY_KEY; if(q('listFyFilter'))q('listFyFilter').value=window.CURRENT_FY_KEY; loadCmsTrackingV2();};
  window.filterCmsRows=function(){var query=value('searchBox').toLowerCase(), st=value('statusFilter'); renderList((window.CMS_ROWS||[]).filter(function(r){return (!query||JSON.stringify(r).toLowerCase().indexOf(query)>=0)&&(!st||String(r.status||r.currentStage)===st)}));};

  window.openCmsDetail=function(no){ if(!no){showError('Complaint No missing');return;} if(typeof showPage==='function')showPage('workspacePage'); window.CURRENT_COMPLAINT={complaintNo:no}; loader(true); google.script.run.withSuccessHandler(function(res){loader(false); if(!res||res.status==='error'){showError((res&&res.message)||'Case load failed');return;} renderWorkspace(res);}).withFailureHandler(function(e){loader(false);showError((e&&e.message)||'Case load failed')}).getCmsFastWorkspaceDataP6_4(no); };

  function renderWorkspace(res){var c=res.complaint||{}, no=res.complaintNo||c.complaintNo||''; window.CURRENT_COMPLAINT=c; window.CURRENT_COMPLAINT.complaintNo=no; text('detailTitle',no); text('trackingSubTitle','Complaint No: '+no); renderCase(res,c,no); renderStages((res.tracking&&res.tracking.stages)||res.stages||[]); renderActions(res.stageActions||[],no); renderInfo(res.info||{},no); renderCapa(res.capa||{},no,res); renderChat(res.chat||((res.info&&res.info.chat)||[])); renderTimeline((res.tracking&&res.tracking.logs)||res.timeline||[]);}
  function cell(k,v,wide){return '<div class="p64-cell '+(wide?'wide':'')+'"><span>'+esc(k)+'</span><b>'+esc(v||'—')+'</b></div>'}
  function link(label,url){return url?'<a class="p64-btn soft" target="_blank" href="'+esc(url)+'">'+esc(label)+'</a>':'<button class="p64-btn secondary" disabled>'+esc(label)+'</button>'}
  function renderCase(res,c,no){var l=res.quickLinks||{}; set('detailBody','<div class="p64-case"><div class="p64-case-top"><div><div class="detail-kicker">Complaint / CAPA Case</div><h2>'+esc(no)+'</h2></div><div class="p64-status"><span class="p64-chip">'+esc(res.currentStage||c.status||'Complaint Booked')+'</span><div class="mt-2"><b>Owner:</b> '+esc(res.stageOwner||c.stageOwner||'—')+'</div><div><b>CAPA:</b> '+esc(res.capaStatus||c.capaStatus||'Not started')+'</div></div></div><div class="p64-info-grid">'+cell('Customer',first(c.customer,c.customerName,c.location,'—'))+cell('Product',first(c.product,c.itemName,'—'))+cell('Batch',first(c.batch,c.batchNo,'—'))+cell('Severity',c.severity||'—')+cell('City / State',[c.city,c.state].filter(Boolean).join(' / ')||'—')+cell('Pincode',c.pincode||'—')+cell('Address',c.address||'—',true)+'</div></div><div class="p64-links">'+link('Open PDF',first(l.pdfUrl,c.pdfUrl))+link('Open Folder',first(l.folderUrl,c.folderUrl))+link('Public Tracking',first(l.publicTrackingUrl,c.publicTrackingUrl))+'<button class="p64-btn soft" onclick="navigator.clipboard&&navigator.clipboard.writeText(\''+esc(first(l.publicTrackingUrl,''))+'\');showSuccess(\'Tracking link copied\')">Copy Tracking Link</button></div>');}
  function renderStages(stages){set('stageProgress',(stages||[]).map(function(s){var cls=String(s.status||'pending').toLowerCase();var mark=cls==='done'?'✓':(cls==='active'?'•':'');return '<div class="stage-box '+esc(cls)+'"><div class="stage-circle">'+mark+'</div><div class="stage-name">'+esc(s.stage||s.name||'')+'</div></div>'}).join('')||'<div class="p64-empty">No stage data</div>')}
  function renderActions(actions,no){var html='<div class="p64-action-note"><textarea id="p64StageRemark" placeholder="Remark / reference, optional for normal action"></textarea></div><div class="p64-links">'; if(actions&&actions.length){html+=actions.map(function(a){return '<button class="p64-btn '+(a.type==='warning'?'warn':a.type==='danger'?'danger':'')+'" onclick="runFastStageAction(\''+esc(a.code)+'\',\''+esc(no)+'\')">'+esc(a.label)+'</button>'}).join('')}else html+='<div class="p64-empty">No action available for your role/current stage.</div>'; html+='</div>'; set('simpleNextAction',html)}
  window.runFastStageAction=function(code,no){no=no||(window.CURRENT_COMPLAINT&&window.CURRENT_COMPLAINT.complaintNo)||''; if(!no){showError('Complaint No missing');return;} var remark=value('p64StageRemark'); if(code==='REQUEST_MORE_INFO'&&!remark){showError('Please write information required in remark box.');return;} loader(true); google.script.run.withSuccessHandler(function(res){loader(false); if(!res||res.status==='error'){showError((res&&res.message)||'Stage update failed');return;} showSuccess('Stage updated successfully'); openCmsDetail(no); setTimeout(loadCmsTrackingV2,350);}).withFailureHandler(function(e){loader(false);showError((e&&e.message)||'Stage update failed')}).runCmsStageActionP6_4({complaintNo:no,actionCode:code,remark:remark});};
  function renderReqTrack(reqs){var html=''; for(var i=1;i<=3;i++){var r=(reqs||[]).filter(function(x){return Number(x.sequence||x.requestNo)===i})[0]; var cls=r?String(r.status||'open').toLowerCase().replace(/\s+/g,'-'):'not-used'; html+='<div class="p64-req-node '+esc(cls)+'"><div class="dot"></div><b>Request '+i+'</b><div class="small">'+esc(r?r.status:'Not Used')+'</div></div>'} set('requestMiniTimeline','<div class="p64-request-track">'+html+'</div>')}
  function renderInfo(info,no){var reqs=info.requests||[], active=info.activeRequest||info.active||null, p=info.permissions||{}; text('infoRequestCounter',(reqs.length||0)+' / 3 Requests'); renderReqTrack(reqs); var html=''; if(p.canRaise){html+='<div class="p64-form"><b>Raise More Info Request</b><textarea id="p64QaQuestion" placeholder="Write exact information required from Sales / Customer"></textarea><button class="p64-btn warn mt-2" onclick="raiseP64Info(\''+esc(no)+'\')">Raise Request</button></div>'} if(active){html+='<div class="p64-form"><b>Active Request '+esc(active.sequence||'')+'</b><div class="p64-chip mt-1">'+esc(active.status||'Open')+'</div><div class="mt-2">'+esc(active.question||active.qaQuestion||'')+'</div>'; if(/Open|Reopened/i.test(String(active.status||''))){html+='<textarea id="p64SalesResponse" class="mt-2" placeholder="Sales response / customer information"></textarea><input type="file" id="p64SalesAttachment" class="form-control mt-2"><button class="p64-btn mt-2" onclick="submitP64SalesResponse(\''+esc(active.requestId)+'\')">Complete Request with Attachment</button>'} if(/Sales Responded/i.test(String(active.status||''))){html+='<textarea id="p64QaReview" class="mt-2" placeholder="QA review / reopen reason"></textarea><button class="p64-btn mt-2 me-2" onclick="reviewP64Info(\''+esc(active.requestId)+'\',\'ACCEPT\')">Accept & Close</button><button class="p64-btn warn mt-2" onclick="reviewP64Info(\''+esc(active.requestId)+'\',\'REOPEN\')">Reopen</button>'} html+='</div>'} if(!active&&!p.canRaise)html+='<div class="p64-empty">No active information request.</div>'; set('infoRequestContent',html)}
  window.raiseP64Info=function(no){var q=value('p64QaQuestion'); if(!q){showError('Request detail required');return;} loader(true); google.script.run.withSuccessHandler(function(){loader(false);showSuccess('More Info request raised');openCmsDetail(no)}).withFailureHandler(function(e){loader(false);showError((e&&e.message)||'Request failed')}).raiseCmsInfoRequestP6_4({complaintNo:no,question:q});};
  window.submitP64SalesResponse=function(id){var txt=value('p64SalesResponse'); if(!txt){showError('Sales response required');return;} fileData('p64SalesAttachment',function(file){loader(true); google.script.run.withSuccessHandler(function(res){loader(false);showSuccess('Sales response submitted');openCmsDetail(res.complaintNo)}).withFailureHandler(function(e){loader(false);showError((e&&e.message)||'Response failed')}).respondCmsInfoRequestP6_4({requestId:id,response:txt,fileDataUrl:file});});};
  window.reviewP64Info=function(id,decision){var c=value('p64QaReview')||'Accepted'; if(decision==='REOPEN'&&!value('p64QaReview')){showError('Reopen reason required');return;} loader(true); google.script.run.withSuccessHandler(function(res){loader(false);showSuccess(res.message||'Request updated');openCmsDetail(res.complaintNo)}).withFailureHandler(function(e){loader(false);showError((e&&e.message)||'Review failed')}).reviewCmsInfoRequestP6_4({requestId:id,decision:decision,comment:c});};
  function renderChat(chat){if(!chat||!chat.length){set('workspaceChatPanel','<div class="chat-empty">No request conversation yet.</div>');return;} set('workspaceChatPanel','<div class="p64-chat">'+chat.map(function(m){var side=/sales/i.test(String(m.side||m.by||m.type||''))?'sales':'qa';return '<div class="p64-bubble '+side+'"><b>'+esc(m.by||side.toUpperCase())+'</b><div>'+esc(m.message||'')+'</div>'+(m.attachmentUrl?'<a target="_blank" href="'+esc(m.attachmentUrl)+'">Attachment</a>':'')+'<small>'+esc(m.at||'')+'</small></div>'}).join('')+'</div>')}
  function renderCapa(capa,no,res){var latest=(capa&&capa.latest)||{}; var html=latest.documentUrl?'<div class="p64-form"><b>Latest CAPA Version '+esc(latest.version||'')+'</b><div class="p64-chip mt-1">'+esc(latest.status||'')+'</div><br><a class="p64-btn soft mt-2" target="_blank" href="'+esc(latest.documentUrl)+'">View CAPA</a></div>':'<div class="p64-empty">No CAPA uploaded yet.</div>'; if((capa&&capa.canUpload)||(res.access&&res.access.isAdmin)){html+='<div class="p64-form"><b>Upload CAPA</b><input type="file" id="p64CapaFile" class="form-control"><textarea id="p64CapaRemark" class="mt-2" placeholder="CAPA upload remark"></textarea><button class="p64-btn mt-2" onclick="uploadP64Capa(\''+esc(no)+'\')">Upload CAPA</button></div>'} if((capa&&capa.canSalesAction)||(res.access&&res.access.isAdmin&&latest.documentUrl)){html+='<div class="p64-links"><button class="p64-btn" onclick="verifyP64Capa(\''+esc(no)+'\')">Verify & Close</button><button class="p64-btn warn" onclick="revisionP64Capa(\''+esc(no)+'\')">Request Revision</button></div>'} set('p4WorkspaceContent',html)}
  window.uploadP64Capa=function(no){fileData('p64CapaFile',function(file){if(!file){showError('Select CAPA file');return;} loader(true); google.script.run.withSuccessHandler(function(){loader(false);showSuccess('CAPA uploaded');openCmsDetail(no)}).withFailureHandler(function(e){loader(false);showError((e&&e.message)||'CAPA upload failed')}).uploadCmsCapaDocumentP6_4({complaintNo:no,documentDataUrl:file,remark:value('p64CapaRemark')});});};
  window.verifyP64Capa=function(no){loader(true); google.script.run.withSuccessHandler(function(){loader(false);showSuccess('CAPA verified and case closed');openCmsDetail(no);setTimeout(loadCmsTrackingV2,350)}).withFailureHandler(function(e){loader(false);showError((e&&e.message)||'CAPA verify failed')}).verifyCmsCapaDocumentP6_4({complaintNo:no,remark:'CAPA verified'});};
  window.revisionP64Capa=function(no){var r=value('p64StageRemark')||'CAPA revision requested'; loader(true); google.script.run.withSuccessHandler(function(){loader(false);showSuccess('CAPA revision requested');openCmsDetail(no)}).withFailureHandler(function(e){loader(false);showError((e&&e.message)||'Revision failed')}).requestCmsCapaRevisionP6_4({complaintNo:no,remark:r});};
  function renderTimeline(logs){set('trackingLogList',(logs||[]).map(function(l){return '<div class="log-row"><div><div class="log-date">'+esc((l.date||l.createdAt||l.time||'').slice(0,10))+'</div><div class="log-time">'+esc((l.time||'').slice(11,19))+'</div></div><div class="log-dot">✓</div><div><div class="log-stage">'+esc(l.stage||l.newStage||l.newStatus||'')+'</div><div class="log-remarks">'+esc(l.remark||l.remarks||'')+'</div></div></div>'}).join('')||'<div class="p64-empty">No timeline yet.</div>');}
  setTimeout(function(){if(q('dashboardPage')&&q('dashboardPage').classList.contains('active'))loadCmsTrackingV2();},900);
})();
</script>
